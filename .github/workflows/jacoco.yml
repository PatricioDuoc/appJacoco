name: JaCoCo CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar tests y JaCoCo
        run: ./mvnw clean test

      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: reporte-jacoco
          path: target/site/jacoco/